name: Staging Tests

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]
  schedule:
    - cron: "0 8 * * *"  # daily at 08:00 UTC (switch to "0 8 */3 * *" for production)

permissions: {}

jobs:
  integration-tests:
    timeout-minutes: 45
    if: >-
      github.event_name != 'schedule'
      || github.repository == 'bluerock-io/bluerock-qa'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: acoustic/python-oss
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development' }}
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('acoustic/python/pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development' }}
      # install bluerock first — pure Python, and bluerock-oss depends on it.
      - run: pip install -e "acoustic/python/[test]"
      # then bluerock-oss — the Rust DSO half of the package.
      - run: pip install -r .github/requirements/build-cibw.txt
      - run: pip install acoustic/python-oss/
      # test-only dependencies (mcp, fastmcp, pytest plugins, etc.).
      - run: pip install -r .github/requirements/test.txt
      # sanity check: the DSO resolves to a file on disk after install.
      - run: python -c "import bluerock_oss; print(bluerock_oss.get_dso_path())"
      # smoke tests.
      - run: pytest acoustic/python/tests/test_bluepython_import.py acoustic/python/tests/test_smoke.py -v --no-header
      # integration tests — exercises the sensor end-to-end against the DSO.
      - name: Run OSS integration tests
        working-directory: acoustic/python
        run: PYTHONPATH=.. python ../run-tests-oss.py --skip-missing-deps
      # cookbook examples — runs every MCP example to confirm the public
      # usage paths still work.
      - run: python examples/run-examples.py
      # validate that cibuildwheel can still produce a wheel the same
      # way the release pipeline will — catches release-only breakages
      # (manylinux image issues, Rust toolchain drift) at integration time.
      - run: pip install -r .github/requirements/build.txt
      - name: Build bluerock-oss wheel
        run: cibuildwheel --output-dir wheelhouse acoustic/python-oss
        env:
          CIBW_BUILD: "cp312-manylinux_x86_64"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_BEFORE_ALL_LINUX: bash {project}/.github/scripts/install-rustup.sh
          CIBW_BEFORE_BUILD: "pip install -r .github/requirements/build-cibw.txt"
          CIBW_ENVIRONMENT_LINUX: 'PATH="$HOME/.cargo/bin:$PATH"'
      - name: Build bluerock wheel
        run: cd acoustic/python && python -m build --wheel

      # on failure, open a tracking issue so the team sees it (scheduled
      # runs don't create visible signal otherwise).
      - name: Generate failure report
        if: failure()
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          cat <<- EOF > /tmp/integration-failure.md
          ## Integration test failure

          A scheduled integration test has failed.

          **Possible causes:**
          * A dependency update introduced a breaking change
          * A regression in bluerock or bluerock-oss
          * A transient build environment issue

          **CI run:** ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/$GITHUB_RUN_ID
          **Branch:** $GITHUB_REF_NAME
          **Trigger:** $EVENT_NAME
          EOF

      - name: Create issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create bug --color D73A4A --description "Something isn't working" 2>/dev/null || true
          gh label create ci --color 0E8A16 --description "CI/build issue" 2>/dev/null || true
          gh issue create \
            --title "[CI] Integration test failure" \
            --body-file /tmp/integration-failure.md \
            --label bug --label ci
