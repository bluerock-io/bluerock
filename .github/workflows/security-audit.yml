name: Security Audit

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]
  schedule:
    - cron: "0 6 * * 1"  # weekly Monday 06:00 UTC
  workflow_dispatch:

permissions: {}

jobs:
  # advisories run as a separate, non-blocking check (same pattern
  # chainguard uses). this way, an unrelated upstream change to the
  # advisory database — a new CVSS format, a parser incompatibility,
  # a new rule — can't break our CI. findings still show up loudly
  # in the job log, and the scheduled weekly run opens a tracking
  # issue if anything fails.
  rust-advisories:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979  # v2.0.15
        with:
          manifest-path: acoustic/Cargo.toml
          command: check advisories
          log-level: warn

      - name: Generate failure report
        if: failure() && github.event_name == 'schedule'
        run: |
          cat <<- EOF > /tmp/audit-failure.md
          ## Security audit failure (advisories)

          The weekly security audit has found Rust advisories.

          **CI run:** ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/$GITHUB_RUN_ID
          **Job:** rust-advisories
          EOF
      - name: Create issue on failure
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create security --color D93F0B --description "Security issue" 2>/dev/null || true
          gh label create ci --color 0E8A16 --description "CI/build issue" 2>/dev/null || true
          gh issue create \
            --title "[CI] Security audit failure: Rust advisories" \
            --body-file /tmp/audit-failure.md \
            --label security --label ci

  # license and ban checks stay strict (no continue-on-error). these
  # are policy violations coming from changes in this repo, not flaky
  # upstream parser issues — they should never regress silently.
  rust-bans-licenses:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979  # v2.0.15
        with:
          manifest-path: acoustic/Cargo.toml
          command: check bans licenses sources

  # Go advisories (govulncheck → OSV/golang.org/vuln), non-blocking.
  # every Go release ships with new stdlib CVEs, and we bump go.mod
  # via dependabot — blocking CI on that cadence would be constantly
  # red. this job still surfaces findings in the log and opens a
  # tracking issue on scheduled failure.
  go-advisories:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version-file: observe/spoolfile2loki/go.mod
      - name: Go vulnerability check
        working-directory: observe/spoolfile2loki
        run: |
          # pin govulncheck to a specific release rather than @latest
          # so the same commit produces the same CI run every time.
          # v1.1.3 pulled x/tools v0.23.0 which no longer compiles
          # under go 1.24+; bump to the next release that tracks a
          # compatible x/tools. bump again if go.mod's toolchain moves
          # past what this govulncheck release supports.
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

  # fail the build if any .go file isn't gofmt-clean. this catches
  # drift early so PRs don't land with formatting noise that makes
  # later diffs harder to read.
  go-format:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version-file: observe/spoolfile2loki/go.mod
      - name: gofmt check
        working-directory: observe/spoolfile2loki
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "ERROR: files need gofmt:"
            echo "$unformatted"
            echo ""
            echo "run: gofmt -w observe/spoolfile2loki"
            exit 1
          fi
          echo "all go files are gofmt-clean"

  # Go license check stays strict — these are repo policy decisions
  # about what licenses we'll accept, not upstream flakiness.
  go-licenses:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version-file: observe/spoolfile2loki/go.mod
      - name: Go license check
        working-directory: observe/spoolfile2loki
        run: |
          # pin go-licenses to a specific release rather than @latest
          # for reproducible CI runs.
          go install github.com/google/go-licenses@v1.6.0
          go-licenses check ./... --allowed_licenses=Apache-2.0,MIT,BSD-2-Clause,BSD-3-Clause,ISC

  workflow-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: Install zizmor
        run: pip install zizmor==1.6.0
      - name: Run zizmor (SARIF generation)
        run: zizmor --format sarif .github/workflows/ > zizmor-results.sarif || true
      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: zizmor-sarif
          path: zizmor-results.sarif
          retention-days: 30
          if-no-files-found: warn
      - name: Upload to code-scanning (public repos only)
        if: github.repository == 'bluerock-io/bluerock'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699  # v3.35.1
        with:
          sarif_file: zizmor-results.sarif
      - name: Fail on findings (exit-code gate)
        run: zizmor --min-confidence high .github/workflows/

  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: Install actionlint (with checksum verification)
        run: |
          ACTIONLINT_VERSION=1.7.7
          # use -f and -S so curl exits non-zero on HTTP 4xx/5xx (and
          # shows the error) instead of silently saving a 404 error
          # page as the tarball and failing unpredictably later.
          curl -sSLfO "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl -sSLfO "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_checksums.txt"
          grep "linux_amd64.tar.gz" "actionlint_${ACTIONLINT_VERSION}_checksums.txt" | sha256sum -c
          tar xzf actionlint_*.tar.gz
          chmod +x actionlint
      - name: Run actionlint
        run: ./actionlint -color .github/workflows/*.yml

  # CodeQL Actions analysis — the scan itself runs on every repo, but
  # uploading SARIF results to the code-scanning tab needs GitHub
  # Advanced Security, which we only have on the public prod repo.
  # continue-on-error: true lets the scan still surface findings in
  # the job log on QA (where upload is silently skipped), and the
  # upload works normally on prod.
  codeql-actions:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@5c8a8a642e79153f5d047b10ec1cba1d1cc65699  # v3.35.1
        with:
          languages: actions
          build-mode: none
      - uses: github/codeql-action/analyze@5c8a8a642e79153f5d047b10ec1cba1d1cc65699  # v3.35.1
        with:
          category: "/language:actions"
          # skip SARIF upload on non-prod repos (GitHub Advanced
          # Security isn't active there). the scan itself still runs
          # and findings show up in the job log.
          upload: ${{ github.repository == 'bluerock-io/bluerock' && 'always' || 'never' }}

  # Python advisories (pip-audit against the OSV/PyPI database),
  # non-blocking. dependabot opens fix PRs on its own cadence — CI
  # shouldn't go red on a freshly-published advisory while the
  # matching dependabot PR is still in review.
  python-advisories:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
      - run: pip install -r .github/requirements/audit.txt
      - run: pip install -e "acoustic/python/[test]"
      - run: pip-audit

      - name: Generate failure report
        if: failure() && github.event_name == 'schedule'
        run: |
          cat <<- EOF > /tmp/audit-failure.md
          ## Security audit failure (advisories)

          The weekly security audit has found Python advisories.

          **CI run:** ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/$GITHUB_RUN_ID
          **Job:** python-advisories
          EOF
      - name: Create issue on failure
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create security --color D93F0B --description "Security issue" 2>/dev/null || true
          gh label create ci --color 0E8A16 --description "CI/build issue" 2>/dev/null || true
          gh issue create \
            --title "[CI] Security audit failure: Python advisories" \
            --body-file /tmp/audit-failure.md \
            --label security --label ci

