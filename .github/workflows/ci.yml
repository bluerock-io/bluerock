# CI — bluerock + bluerock-oss (Python hooks + acoustic-oss Rust DSO)
name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]
  schedule:
    - cron: "0 8 * * 1"  # weekly Monday 08:00 UTC

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.12'

jobs:
  lint-rust:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: acoustic/python-oss
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development' }}
      - run: cargo fmt --manifest-path acoustic/python-oss/Cargo.toml -- --check
      - run: cargo clippy --manifest-path acoustic/python-oss/Cargo.toml --no-deps -- -D warnings

  lint-python:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r .github/requirements/lint.txt
      - run: black --check --config acoustic/python/pyproject.toml acoustic/python/
      - run: ruff check acoustic/python/
      - name: Verify dependency lock file
        # the lockfile is always expected on the default branch; a
        # missing file should fail the check, not skip it.
        run: bash .github/scripts/lock-deps.sh --verify

  build-test-unified:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: [lint-rust, lint-python]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: acoustic/python-oss
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development' }}
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('acoustic/python/pyproject.toml') }}
          restore-keys: pip-${{ runner.os }}-
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development' }}
      # rust unit tests (independent of the Python side).
      - run: cargo test --manifest-path acoustic/python-oss/Cargo.toml --no-fail-fast -- --test-threads=1
      # install bluerock first — it's pure Python, and bluerock-oss depends on it.
      - run: pip install -e "acoustic/python/[test]" -r .github/requirements/test.txt
      # build and install bluerock-oss (the Rust DSO, via setuptools-rust).
      - name: Build and install bluerock-oss (Rust DSO)
        run: |
          pip install -r .github/requirements/build-cibw.txt
          pip install acoustic/python-oss/
      - run: python -m bluepython --help
      # integration tests — DSO is discovered via the installed bluerock-oss package.
      - run: pytest acoustic/python/tests/test_bluepython_import.py acoustic/python/tests/test_smoke.py -v --no-header
      - name: Run OSS integration tests
        working-directory: acoustic/python
        run: PYTHONPATH=.. python ../run-tests-oss.py --skip-missing-deps
      # MCP examples — confirm they produce the events we expect.
      - run: python examples/run-examples.py
      - name: Check git cleanliness
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Build produced uncommitted changes:"
            git status --short
            git diff
            exit 1
          fi

  test-wheel-install:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: [build-test-unified]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r .github/requirements/build.txt
      # build the bluerock-oss wheel inside the manylinux container —
      # same toolchain the release pipeline uses, so CI catches anything
      # that would only show up at release time.
      - name: Build bluerock-oss wheel
        run: cibuildwheel --output-dir wheelhouse acoustic/python-oss
        env:
          CIBW_BUILD: "cp312-manylinux_x86_64"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_BEFORE_ALL_LINUX: bash {project}/.github/scripts/install-rustup.sh
          CIBW_BEFORE_BUILD: "pip install -r .github/requirements/build-cibw.txt"
          CIBW_ENVIRONMENT_LINUX: 'PATH="$HOME/.cargo/bin:$PATH"'
      # build the bluerock wheel — pure Python, no compilation step.
      - name: Build bluerock wheel
        run: cd acoustic/python && python -m build --wheel
      # install and smoke-check — bluerock goes in first because bluerock-oss
      # declares it as a dependency.
      - run: pip install acoustic/python/dist/*.whl
      - run: pip install wheelhouse/*.whl
      - run: |
          python -c "import bluerock_oss; print(bluerock_oss.get_dso_path())"

  # weekly check: do our mcp hooks work with the latest upstream mcp/fastmcp?
  # runs on schedule only, doesn't block normal CI
  mcp-compat:
    timeout-minutes: 20
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: acoustic/python-oss
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development' }}
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install with latest upstream mcp + fastmcp
        run: |
          pip install -e "acoustic/python/[test]"
          pip install -r .github/requirements/build-cibw.txt
          pip install acoustic/python-oss/
          pip install --upgrade mcp fastmcp
          echo "mcp=$(pip show mcp | grep Version | cut -d' ' -f2)" >> "$GITHUB_STEP_SUMMARY"
          echo "fastmcp=$(pip show fastmcp | grep Version | cut -d' ' -f2)" >> "$GITHUB_STEP_SUMMARY"
      - name: Run MCP integration tests
        run: python examples/run-examples.py
      - name: Create issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MCP_VER=$(pip show mcp | grep Version | cut -d' ' -f2)
          FMCP_VER=$(pip show fastmcp | grep Version | cut -d' ' -f2)
          gh label create mcp-compat --color D93F0B --description "MCP compatibility issue" 2>/dev/null || true
          # dedup: if an mcp-compat issue is already open, append a
          # weekly comment instead of creating a new one. keeps the
          # tracker clean across long-running incompatibility windows.
          WEEK=$(date -u +%Y-%m-%d)
          EXISTING=$(gh issue list --label mcp-compat --state open --json number --limit 1 --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" \
              --body "Still failing on ${WEEK} with mcp==${MCP_VER} fastmcp==${FMCP_VER}. See pipeline for details."
          else
            gh issue create \
              --title "MCP hooks incompatible with mcp==${MCP_VER} fastmcp==${FMCP_VER}" \
              --body "The weekly MCP compatibility check failed against the latest upstream versions. Our pinned versions (test.txt) still work. Action: update mcp_hooks.py to support the new API. First observed: ${WEEK}." \
              --label mcp-compat
          fi
