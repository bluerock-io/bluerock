# spoolfile2loki configuration for docker-compose deployment.
# Mock mode — generates synthetic events from embedded test data.

loki_endpoint: "http://loki:3100"

loki_retry:
  max_retries: 10
  retry_delay: 2s

poll_interval: 60s
batch_size: 100
state_file: "/var/spoolfile2loki/state"
log_level: "info"
mock: true

labels:
  environment: "dev"
  source: "spoolfile2loki"
