services:
  loki:
    image: grafana/loki:3.5.1
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --output-document=- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:11.6.0
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./boards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    depends_on:
      loki:
        condition: service_healthy

  spoolfile2loki:
    build:
      context: ../spoolfile2loki
      dockerfile: Dockerfile
    volumes:
      - ./${CONFIG_FILE:-spoolfile2loki-mock.yaml}:/etc/spoolfile2loki/config.yaml:ro
      - ${SPOOL_DIR:-/dev/null}:/data/spool:ro
      - spoolfile2loki-state:/var/spoolfile2loki
    depends_on:
      loki:
        condition: service_healthy

volumes:
  loki-data:
  grafana-data:
  spoolfile2loki-state:
